<!-- Sticky Top Navigation -->
<nav
  id="top-nav"
  class="bg-white border-b border-gray-200
         sticky top-0 z-50
         transition-shadow"
>
  <div class="px-4 lg:px-6">
    <div class="flex items-center justify-between h-14 w-full relative">

      <!-- LEFT: Logo & Course -->
      <div class="flex items-center gap-3 min-w-0 flex-1">
        <!-- Logo -->
        <div class="flex items-center gap-2 flex-shrink-0">
          <i class="fa-solid fa-graduation-cap text-blue-600 text-xl"></i>
          <span class="text-lg font-semibold text-gray-900">Studio</span>
        </div>

        <!-- Divider -->
        <div class="h-6 w-px bg-gray-300"></div>

        <!-- Course -->
        <div class="min-w-0">
          <div class="text-xs text-gray-500 uppercase tracking-wide">Course | {{ course.course_number }} | {{ course.course_run }} | {{ course.status_course }}</div>
          <h1 class="text-sm font-medium text-gray-900 truncate"><a href="{% url 'courses:studio' course.id %}">
            {{ course.course_name }}</a>
          </h1>
        </div>
      </div>

      <!-- CENTER: Settings Dropdown -->
      <div class="absolute left-1/2 transform -translate-x-1/2">
        <div class="relative">
          <button id="profile-btn" class="flex items-center gap-2 p-2 rounded hover:bg-gray-100">
            <i class="fa-solid fa-cog text-gray-700"></i>
            <span class="text-sm font-medium text-gray-900">Settings</span>
            <i class="fa-solid fa-caret-down text-xs"></i>
          </button>

          <!-- Dropdown Menu -->
          <div id="profile-menu" class="absolute left-1/2 transform -translate-x-1/2 mt-2 w-56 bg-white border border-gray-200 rounded shadow-lg hidden">
            <a href="{% url 'courses:studio' course.id %}" class="block px-4 py-2 text-sm text-gray-700 hover:bg-gray-100">Outline</a>
            <a href="{% url 'instructor:studios' course.id %}" class="block px-4 py-2 text-sm text-gray-700 hover:bg-gray-100">Curations</a>
            <a href="{% url 'courses:course_profile' course.id %}" class="block px-4 py-2 text-sm text-gray-700 hover:bg-gray-100">Schedule</a>
            <a href="{% url 'courses:course_grade' course.id %}" class="block px-4 py-2 text-sm text-gray-700 hover:bg-gray-100">Grading</a>
            <a href="{% url 'courses:course_team' course.id %}" class="block px-4 py-2 text-sm text-gray-700 hover:bg-gray-100">Teams</a>
            {% if request.user.is_superuser or request.user.is_partner %}
            <a href="{% url 'courses:course_instructor' course.id %}" class="block px-4 py-2 text-sm text-gray-700 hover:bg-gray-100">
            
              <span>Instructor</span>
            </a>
            {% endif %}

            <a href="{% url 'courses:add_course_price' course.id %}" class="block px-4 py-2 text-sm text-gray-700 hover:bg-gray-100">
              
              <span>Price</span>
            </a>
            
          
          
                <a href="{% url 'courses:section_reports_dashboard' course.id %}" class="block px-4 py-2 text-sm text-gray-700 hover:bg-gray-100">
                    
                 
                  <span>report</span>
                  </a>

          </div>
        </div>
      </div>

      <!-- RIGHT: Action Buttons -->
      <div class="flex items-center gap-2 flex-shrink-0">
        <a href="{% url 'courses:self_course' user.username course.id course.slug %}"
          class="px-3 py-1.5 text-xs sm:text-sm font-medium text-gray-700
                  border border-gray-300 rounded
                  hover:bg-gray-50 transition
                  flex items-center gap-1.5">
          <i class="fa-solid fa-eye text-xs"></i>
          <span>View Live</span>
        </a>


        

        <!-- Mobile Menu Button -->
        <button class="p-2 text-gray-600 hover:bg-gray-100 rounded md:hidden">
          <i class="fa-solid fa-bars"></i>
        </button>
      </div>
    </div>
  </div>
</nav>



<!-- JS untuk toggle dropdown -->
<script>
  const profileBtn = document.getElementById('profile-btn');
  const profileMenu = document.getElementById('profile-menu');

  profileBtn.addEventListener('click', (e) => {
    e.stopPropagation();
    profileMenu.classList.toggle('hidden');
  });

  // Klik di luar untuk menutup
  window.addEventListener('click', (e) => {
    if (!profileBtn.contains(e.target) && !profileMenu.contains(e.target)) {
      profileMenu.classList.add('hidden');
    }
  });
</script>
